spring:
  datasource:
    url: jdbc:h2:mem:bugvault_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  thymeleaf:
    check-template-location: false

# Minimal actuator exposure in tests
management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: "test-secret-key-min-32-chars-xxxxxxxxxxx"
    expiration-ms: 86400000
